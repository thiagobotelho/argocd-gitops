apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/apps

labels:
  - pairs:
      app.kubernetes.io/name: platform-applications
      app.kubernetes.io/instance: platform-applications-desenvolvimento
      app.kubernetes.io/component: app-of-apps
      app.kubernetes.io/part-of: platform
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/environment: desenvolvimento
    includeSelectors: false
