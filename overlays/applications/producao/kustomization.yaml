apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/apps

labels:
  - pairs:
      app.kubernetes.io/name: platform-applications
      app.kubernetes.io/instance: platform-applications-producao
      app.kubernetes.io/component: app-of-apps
      app.kubernetes.io/part-of: platform
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/environment: producao
    includeSelectors: false

patches:
  - target: {kind: Application, name: grafana}
    patch: |-
      - op: replace
        path: /spec/source/path
        value: overlays/producao
  - target: {kind: Application, name: keycloak-dev}
    patch: |-
      - op: replace
        path: /metadata/name
        value: keycloak-producao
      - op: replace
        path: /spec/source/path
        value: overlays/producao
      - op: replace
        path: /spec/destination/namespace
        value: keycloak-producao
  - target: {kind: Application, name: loki}
    patch: |-
      - op: replace
        path: /spec/source/path
        value: overlays/producao
  - target: {kind: Application, name: metallb-cluster}
    patch: |-
      - op: replace
        path: /spec/source/path
        value: overlays/producao
  - target: {kind: Application, name: opentelemetry}
    patch: |-
      - op: replace
        path: /spec/source/path
        value: overlays/producao
  - target: {kind: Application, name: prometheus-apps}
    patch: |-
      - op: replace
        path: /spec/source/path
        value: overlays/producao
  - target: {kind: Application, name: pyroscope}
    patch: |-
      - op: replace
        path: /spec/source/path
        value: overlays/producao
  - target: {kind: Application, name: tempo-monolithic}
    patch: |-
      - op: replace
        path: /spec/source/path
        value: overlays/producao
  - target: {kind: Application, name: zabbix}
    patch: |-
      - op: replace
        path: /spec/source/path
        value: overlays/producao
