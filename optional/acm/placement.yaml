apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: openshift-local-stack
  namespace: openshift-gitops
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: gitops.stack/managed
              operator: In
              values:
                - "true"
            - key: gitops.stack/environment
              operator: In
              values:
                - desenvolvimento
                - aceite
                - producao
